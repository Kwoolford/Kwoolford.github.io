---
layout: default
---
<article class="post">
  <header class="post-header wrap-narrow">
    <h1 class="post-title">{{ page.title }}</h1>
    {%- if page.lede -%}
    <p class="post-lede">{{ page.lede }}</p>
    {%- endif -%}
  </header>
  <div class="post-body wrap-narrow">
    {{ content }}
  </div>
</article>
